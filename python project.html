<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Exam Cheater Detector</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
    font-family:Arial;
}

.container-box{
    max-width:900px;
    margin:auto;
    margin-top:30px;
}

.card{
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.1);
}

video{
    border-radius:10px;
    border:3px solid #0d6efd;
}

.warning-box{
    background:#fff3cd;
    color:#856404;
    padding:10px;
    border-radius:10px;
    display:none;
}

.log-box{
    height:200px;
    overflow-y:auto;
    background:#000;
    color:#00ff00;
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container container-box">

    <div class="card p-4">

        <h1 class="text-center text-primary">
            Online Exam Cheater Detector
        </h1>

        <hr>

        <!-- Login Section -->
        <div id="loginSection">

            <h4>Student Login</h4>

            <input type="text"
                   id="studentName"
                   class="form-control mb-3"
                   placeholder="Enter Your Name">

            <button class="btn btn-primary w-100"
                    onclick="startExam()">
                    Start Exam
            </button>

        </div>

        <!-- Exam Section -->
        <div id="examSection" style="display:none;">

            <div class="d-flex justify-content-between">

                <h4 id="welcomeText"></h4>

                <h3 class="text-danger">
                    Time Left:
                    <span id="timer">30:00</span>
                </h3>

            </div>

            <hr>

            <div class="warning-box mb-3" id="warningBox">
                Warning: Suspicious activity detected!
            </div>

            <div class="card p-3 mb-3">

                <h5>Question 1:</h5>

                <p>
                    Explain Artificial Intelligence and its applications.
                </p>

                <textarea class="form-control"
                          rows="5"></textarea>

            </div>

            <div class="row">

                <div class="col-md-6">

                    <h5>Live Webcam Monitoring</h5>

                    <video id="webcam"
                           width="100%"
                           autoplay></video>

                </div>

                <div class="col-md-6">

                    <h5>Cheating Detection Logs</h5>

                    <div class="log-box"
                         id="logBox">
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let totalTime = 1800;
let cheatCount = 0;

// Start Exam
function startExam(){

    let name = document.getElementById("studentName").value;

    if(name === ""){
        alert("Please enter your name");
        return;
    }

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("examSection").style.display = "block";

    document.getElementById("welcomeText").innerHTML =
        "Welcome, " + name;

    startTimer();
    startMonitoring();
    startWebcam();
}

// Timer
function startTimer(){

    let timer = setInterval(function(){

        let minutes = Math.floor(totalTime / 60);
        let seconds = totalTime % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        document.getElementById("timer").innerHTML =
            minutes + ":" + seconds;

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            alert("Exam Finished!");
        }

    },1000);
}

// Webcam Access
async function startWebcam(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        document.getElementById("webcam").srcObject = stream;

    }
    catch(err){

        addLog("Webcam access denied");
    }
}

// Monitoring
function startMonitoring(){

    // Detect tab switching
    document.addEventListener("visibilitychange", function(){

        if(document.hidden){

            showWarning();
            addLog("Tab switching detected");

        }

    });

    // Right click block
    document.addEventListener("contextmenu", function(e){

        e.preventDefault();

        showWarning();
        addLog("Right click disabled");

    });

    // Copy detection
    document.addEventListener("copy", function(){

        showWarning();
        addLog("Copy attempt detected");

    });

    // Key press detection
    document.addEventListener("keydown", function(e){

        if(e.ctrlKey || e.altKey){

            showWarning();
            addLog("Shortcut key detected");

        }

        // Prevent refresh
        if(e.key === "F5"){

            e.preventDefault();

            showWarning();
            addLog("Refresh attempt blocked");

        }

    });

    // Fullscreen mode
    document.documentElement.requestFullscreen();

    document.addEventListener("fullscreenchange", function(){

        if(!document.fullscreenElement){

            showWarning();
            addLog("Exited fullscreen mode");

        }

    });

}

// Warning
function showWarning(){

    cheatCount++;

    let warningBox =
    document.getElementById("warningBox");

    warningBox.style.display = "block";

    setTimeout(function(){

        warningBox.style.display = "none";

    },3000);

    if(cheatCount >= 5){

        alert("Too many suspicious activities detected!");

    }
}

// Add Logs
function addLog(message){

    let logBox =
    document.getElementById("logBox");

    let currentTime =
    new Date().toLocaleTimeString();

    logBox.innerHTML +=
        "[" + currentTime + "] "
        + message + "<br>";

    logBox.scrollTop =
    logBox.scrollHeight;

    console.log(message);
}

</script>

</body>
</html>
